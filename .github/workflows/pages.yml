name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation.html'
      - '.github/workflows/pages.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp presentation.html _site/index.html
          cp presentation.html _site/presentation.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
